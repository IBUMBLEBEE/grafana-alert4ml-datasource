name: 'Rust Plugin Builder'
description: 'Compiles Rust static library for the plugin (musl targets) using cargo-zigbuild'

inputs:
  target:
    description: 'Rust compilation target (musl)'
    default: 'x86_64-unknown-linux-musl'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        toolchain: nightly-2025-12-05
        targets: ${{ inputs.target }}

    - name: Add Rust musl target
      shell: bash
      run: rustup target add ${{ inputs.target }} --toolchain nightly-2025-12-05

    - name: Install zig
      shell: bash
      run: |
        ZIG_VERSION=0.15.2
        curl -fsSL https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz \
          | tar xJ -C /tmp
        sudo mv /tmp/zig-x86_64-linux-${ZIG_VERSION} /opt/zig
        sudo ln -sf /opt/zig/zig /usr/local/bin/zig
        zig version

    - name: Install cargo-zigbuild
      shell: bash
      run: cargo install cargo-zigbuild --locked

    - name: Build Rust static library
      shell: bash
      run: |
        echo "Building rsod for target: ${{ inputs.target }}"
        cd rsod/
        cargo zigbuild --release --target ${{ inputs.target }}
        echo "=== Static library ==="
        ls -lh target/${{ inputs.target }}/release/librsod_go.a
