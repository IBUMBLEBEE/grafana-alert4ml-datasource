name: 'Rust Plugin Builder'
description: 'Compiles Rust static library for the plugin (musl targets)'

inputs:
  target:
    description: 'Rust compilation target (musl)'
    default: 'x86_64-unknown-linux-musl'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cross
      shell: bash
      run: cargo install cross --locked

    - name: Build Rust static library
      shell: bash
      run: |
        echo "Building rsod for target: ${{ inputs.target }}"
        cd rsod/
        cross build --release --target ${{ inputs.target }}
        echo "=== Static library ==="
        ls -lh target/${{ inputs.target }}/release/librsod_go.a
