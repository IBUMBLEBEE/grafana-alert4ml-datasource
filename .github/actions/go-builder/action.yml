name: 'GO Plugin Builder'
description: 'Compiles Go backend for the plugin using zig cc as static C compiler'

inputs:
  target:
    description: 'Rust target triple (x86_64-unknown-linux-musl or aarch64-unknown-linux-musl)'
    default: 'x86_64-unknown-linux-musl'
    required: true

runs:
  using: "composite"
  steps:
    # zig is already installed by rust-builder; skip if present
    - name: Install zig (if not present)
      shell: bash
      run: |
        if ! command -v zig &>/dev/null; then
          ZIG_VERSION=0.14.0
          curl -fsSL https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz \
            | tar xJ -C /tmp
          sudo mv /tmp/zig-linux-x86_64-${ZIG_VERSION} /opt/zig
          sudo ln -sf /opt/zig/zig /usr/local/bin/zig
        fi
        zig version

    # Create zig cc wrapper scripts used by CGO as CC
    - name: Create zig cc wrappers
      shell: bash
      run: |
        printf '#!/bin/sh\nexec zig cc -target x86_64-linux-musl "$@"\n' \
          | sudo tee /usr/local/bin/x86_64-linux-musl-gcc
        sudo chmod +x /usr/local/bin/x86_64-linux-musl-gcc
        printf '#!/bin/sh\nexec zig cc -target aarch64-linux-musl "$@"\n' \
          | sudo tee /usr/local/bin/aarch64-linux-musl-gcc
        sudo chmod +x /usr/local/bin/aarch64-linux-musl-gcc

    # ── Go setup ─────────────────────────────────────────────
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Download Go dependencies
      shell: bash
      run: |
        go install github.com/magefile/mage@latest
        go mod download

    # ── Build ────────────────────────────────────────────────
    - name: Build Go Backend (linux/amd64)
      if: inputs.target == 'x86_64-unknown-linux-musl'
      shell: bash
      run: mage -v build:linux

    - name: Build Go Backend (linux/arm64)
      if: inputs.target == 'aarch64-unknown-linux-musl'
      shell: bash
      run: mage -v build:linuxARM64