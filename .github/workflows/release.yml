name: "Grafana Build Plugin"

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

jobs:
  # ── Step 1: Build frontend once ─────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Node.js Builder
        uses: ./.github/actions/js-builder

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-frontend
          path: dist/
          retention-days: 1

  # ── Step 2: Build Rust + Go backend per platform ─────────────
  build-backend:
    needs: build-frontend
    runs-on: ubuntu-latest
    env:
      PLUGIN_NAME: ibumblebee-alert4ml-datasource
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os_arch: linux-amd64
          - target: aarch64-unknown-linux-musl
            os_arch: linux-arm64
    steps:
      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config zip tar

      - uses: actions/checkout@v4

      - name: Run Rust Builder
        uses: ./.github/actions/rust-builder
        with:
          target: ${{ matrix.target }}

      - name: Run Go Builder
        uses: ./.github/actions/go-builder
        with:
          target: ${{ matrix.target }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-frontend
          path: dist/

      - name: Verify dist contents
        shell: bash
        run: |
          echo "=== dist/ contents ==="
          ls -lh dist/

      - name: Package plugin
        shell: bash
        run: |
          cp -f README.md dist/README.md 2>/dev/null || true
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}-${{ matrix.os_arch }}.zip ${{ env.PLUGIN_NAME }}/
          tar -czf ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}-${{ matrix.os_arch }}.tar.gz ${{ env.PLUGIN_NAME }}/

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os_arch }}
          path: |
            ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}-${{ matrix.os_arch }}.zip
            ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}-${{ matrix.os_arch }}.tar.gz
          retention-days: 1

  # ── Step 3: Create GitHub release with all platform packages ─
  release:
    needs: build-backend
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz