# git-cliff configuration for alert4ml-datasource
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n"
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} **(BREAKING CHANGE)**{% endif %}
{% endfor %}\
{% endfor %}\
{% if version and previous.version %}\

---
**Full Changelog**: https://github.com/IBUMBLEBEE/grafana-alert4ml-datasource/compare/{{ previous.version }}...{{ version }}
{% endif %}\n"""
footer = ""
trim = true

[git]
# Accept all commit styles, not just conventional commits
conventional_commits = false
filter_unconventional = false
split_commits = false

commit_parsers = [
  # Conventional commit prefixes -> grouped sections with emoji
  { message = "^feat",               group = "✨ Features" },
  { message = "^fix",                group = "🐛 Bug Fixes" },
  { message = "^perf",               group = "⚡ Performance" },
  { message = "^refactor",           group = "♻️ Refactoring" },
  { message = "^docs",               group = "📚 Documentation" },
  { message = "^style",              group = "🎨 Styling" },
  { message = "^test",               group = "🧪 Testing" },
  { message = "^ci",                 group = "👷 CI/CD" },
  # Skip release-bump commits to avoid noise
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore",              group = "🔧 Miscellaneous" },
  # Fallback: everything else goes into Changes
  { body = ".*",                     group = "📦 Changes" },
]

filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"
