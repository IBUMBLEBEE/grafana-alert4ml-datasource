# git-cliff configuration for alert4ml-datasource
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n"
body = """
{% if version %}\
# {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
# Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope | upper_first }}:** {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} **[BREAKING CHANGE]**{% endif %}
{% endfor %}\
{% endfor %}\
{% if version and previous.version %}\

**Full Changelog**: https://github.com/IBUMBLEBEE/grafana-alert4ml-datasource/compare/{{ previous.version }}...{{ version }}
{% endif %}\n"""
footer = ""
trim = true

[git]
# Accept all commit styles, not just conventional commits
conventional_commits = false
filter_unconventional = false
split_commits = false

commit_parsers = [
  # Breaking changes get their own section (highest priority)
  { message = ".*!:",                group = "Breaking changes" },
  { body = ".*BREAKING CHANGE",      group = "Breaking changes" },
  # Feature / enhancement commits
  { message = "^feat",               group = "Features and enhancements" },
  { message = "^perf",               group = "Features and enhancements" },
  { message = "^refactor",           group = "Features and enhancements" },
  # Bug fixes
  { message = "^fix",                group = "Bug fixes" },
  # Infra / housekeeping
  { message = "^docs",               group = "Features and enhancements" },
  { message = "^style",              group = "Features and enhancements" },
  { message = "^test",               group = "Features and enhancements" },
  { message = "^ci",                 group = "Features and enhancements" },
  # Skip release-bump commits to avoid noise
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore",              group = "Features and enhancements" },
  # Fallback: everything else
  { body = ".*",                     group = "Features and enhancements" },
]

filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"
